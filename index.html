<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cata PRO</title>
  <style>
    :root {
      --bg: #111;
      --panel: #222;
      --panel-2: #2d2d2d;
      --text: #fff;
      --muted: #aaa;
      --accent: #2ecc71;
      --accent-dark: #27ae60;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: var(--panel);
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }

    input,
    textarea,
    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
      font: inherit;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      background: var(--accent);
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    .rating {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 5px;
    }

    .rating button {
      flex: 1 0 18%;
      background: var(--panel-2);
      color: var(--text);
      margin-top: 0;
    }

    .rating button.active {
      background: var(--accent);
      color: #000;
    }

    .small {
      font-size: 0.8em;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cata PRO</h1>

    <div class="card" id="fase1">
      <h2>Fase 1</h2>
      <input id="nombre" placeholder="Tu nombre">
      <input id="variedad" placeholder="Variedad">
      <input id="precio" type="number" min="0" step="0.01" placeholder="Precio (â‚¬)">
      <button type="button" onclick="iniciar()">Empezar cata</button>
    </div>

    <div class="card" id="fase2" style="display:none;">
      <h2>Fase 2</h2>
      <div id="criterios"></div>
      <textarea id="comentarios" placeholder="Notas..."></textarea>
      <h3>Nota final: <span id="notaFinal">0.00</span></h3>
      <button type="button" onclick="guardar()">Guardar cata</button>
    </div>

    <h2>Historial</h2>
    <div id="historial"></div>
  </div>

  <script>
    const pesos = {
      "Aspecto": 1,
      "Olor": 1.5,
      "Olor tras grinder": 1.5,
      "Sabor": 2,
      "Punch": 2,
      "Pegada": 2,
      "Efecto": 2
    };

    const criteriosLista = [
      ["Aspecto", "Visual, tricomas, calidad general"],
      ["Olor", "Aroma en crudo"],
      ["Olor tras grinder", "Aroma al triturar"],
      ["Sabor", "Sabor al fumar"],
      ["Punch", "Potencia inmediata"],
      ["Pegada", "Efecto posterior"],
      ["Efecto", "DuraciÃ³n del efecto"]
    ];

    let puntuaciones = {};
    let catas = JSON.parse(localStorage.getItem("catas")) || [];

    const fase1 = document.getElementById("fase1");
    const fase2 = document.getElementById("fase2");
    const criteriosDiv = document.getElementById("criterios");
    const historialDiv = document.getElementById("historial");
    const nombreInput = document.getElementById("nombre");
    const variedadInput = document.getElementById("variedad");
    const precioInput = document.getElementById("precio");
    const comentariosInput = document.getElementById("comentarios");
    const notaFinalSpan = document.getElementById("notaFinal");

    function crearBotones(contenedor, key) {
      for (let i = 1; i <= 10; i++) {
        const boton = document.createElement("button");
        boton.type = "button";
        boton.textContent = i;
        boton.onclick = () => {
          [...contenedor.children].forEach((item) => item.classList.remove("active"));
          boton.classList.add("active");
          puntuaciones[key] = i;
          calcular();
        };
        contenedor.appendChild(boton);
      }
    }

    function iniciar() {
      if (!nombreInput.value.trim() || !variedadInput.value.trim()) {
        alert("Completa nombre y variedad");
        return;
      }

      fase1.style.display = "none";
      fase2.style.display = "block";
      criteriosDiv.innerHTML = "";
      puntuaciones = {};
      notaFinalSpan.textContent = "0.00";

      criteriosLista.forEach(([nombre, descripcion]) => {
        const bloque = document.createElement("div");
        const titulo = document.createElement("h3");
        const desc = document.createElement("div");
        const rating = document.createElement("div");

        titulo.textContent = nombre;
        desc.className = "small";
        desc.textContent = descripcion;
        rating.className = "rating";

        bloque.appendChild(titulo);
        bloque.appendChild(desc);
        bloque.appendChild(rating);
        criteriosDiv.appendChild(bloque);
        crearBotones(rating, nombre);
      });
    }

    function calcular() {
      let total = 0;
      let pesoTotal = 0;

      for (const criterio in puntuaciones) {
        total += puntuaciones[criterio] * pesos[criterio];
        pesoTotal += pesos[criterio];
      }

      if (pesoTotal === 0) {
        return 0;
      }

      const nota = (total / pesoTotal).toFixed(2);
      notaFinalSpan.textContent = nota;
      return nota;
    }

    function guardar() {
      if (Object.keys(puntuaciones).length !== criteriosLista.length) {
        alert("Completa todas las puntuaciones");
        return;
      }

      const nota = calcular();

      if (catas.some((cata) => cata.nota === nota)) {
        alert("No puedes repetir nota final");
        return;
      }

      const nueva = {
        nombre: nombreInput.value.trim(),
        variedad: variedadInput.value.trim(),
        precio: precioInput.value,
        puntos: { ...puntuaciones },
        nota,
        comentarios: comentariosInput.value.trim(),
        fecha: new Date().toLocaleString("es-ES")
      };

      catas.push(nueva);
      catas.sort((a, b) => Number(b.nota) - Number(a.nota));
      localStorage.setItem("catas", JSON.stringify(catas));
      render();
      reset();
    }

    function render() {
      historialDiv.innerHTML = "";

      catas.forEach((cata, index) => {
        const div = document.createElement("div");
        div.className = "card";

        const detalle = Object.entries(cata.puntos)
          .map(([criterio, valor]) => `${criterio}: ${valor}`)
          .join("<br>");

        div.innerHTML = `
          <strong>#${index + 1} ${cata.variedad}</strong><br>
          Catador: ${cata.nombre}<br>
          Precio: â‚¬${cata.precio || 0}<br>
          Nota: ${cata.nota}<br>
          <details>
            <summary>Ver detalles</summary>
            ${detalle}
            <br><br>${cata.comentarios || ""}
            <br><br><small>${cata.fecha}</small>
          </details>
        `;

        historialDiv.appendChild(div);
      });
    }

    function reset() {
      fase1.style.display = "block";
      fase2.style.display = "none";
      criteriosDiv.innerHTML = "";
      puntuaciones = {};
      nombreInput.value = "";
      variedadInput.value = "";
      precioInput.value = "";
      comentariosInput.value = "";
      notaFinalSpan.textContent = "0.00";
    }

    render();
  </script>
</body>
</html>
