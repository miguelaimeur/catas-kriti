<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cata PRO</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
.container { max-width:700px; margin:auto; }

.card { background:#222; padding:15px; border-radius:10px; margin-top:15px; }

input, textarea, button {
width:100%; padding:10px; margin-top:5px; border-radius:8px; border:none;
}

button { background:#2ecc71; color:#000; font-weight:bold; }

.rating { display:flex; flex-wrap:wrap; gap:5px; margin-top:5px; }

.rating button {
flex:1 0 18%;
background:#333; color:#fff;
}

.rating button.active { background:#2ecc71; color:#000; }

.small { font-size:0.8em; color:#aaa; }
</style>
</head>

<body>
<div class="container">

<h1>🌿 Cata PRO</h1>

<div class="card" id="fase1">
<h2>Fase 1</h2>
<input id="nombre" placeholder="Tu nombre">
<input id="variedad" placeholder="Variedad">
<input id="precio" type="number" placeholder="Precio (€)">
<button onclick="iniciar()">Empezar cata</button>
</div>

<div class="card" id="fase2" style="display:none;">
<h2>Fase 2</h2>
<div id="criterios"></div>

<textarea id="comentarios" placeholder="Notas..."></textarea>

<h3>Nota final: <span id="notaFinal">0</span></h3>

<button onclick="guardar()">Guardar cata</button>
</div>

<h2>📊 Historial</h2>
<div id="historial"></div>

</div>

<script>

const pesos = {
"Aspecto":1,
"Olor":1.5,
"Olor tras grinder":1.5,
"Sabor":2,
"Punch":2,
"Pegada":2,
"Efecto":2
};

const criteriosLista = [
["Aspecto","Visual, tricomas, calidad general"],
["Olor","Aroma en crudo"],
["Olor tras grinder","Aroma al triturar"],
["Sabor","Sabor al fumar"],
["Punch","Potencia inmediata"],
["Pegada","Efecto posterior"],
["Efecto","Duración del efecto"]
];

let puntuaciones = {};
let catas = JSON.parse(localStorage.getItem("catas")) || [];

// referencias DOM seguras
const fase1 = document.getElementById("fase1");
const fase2 = document.getElementById("fase2");
const criteriosDiv = document.getElementById("criterios");
const historialDiv = document.getElementById("historial");

const nombreInput = document.getElementById("nombre");
const variedadInput = document.getElementById("variedad");
const precioInput = document.getElementById("precio");
const comentariosInput = document.getElementById("comentarios");
const notaFinalSpan = document.getElementById("notaFinal");

// crear botones
function crearBotones(contenedor, key){
for(let i=1;i<=10;i++){
let b=document.createElement("button");
b.textContent=i;

b.onclick=()=>{
[...contenedor.children].forEach(x=>x.classList.remove("active"));
b.classList.add("active");
puntuaciones[key]=i;
calcular();
};

contenedor.appendChild(b);
}
}

// iniciar fase 2
function iniciar(){
if(!nombreInput.value || !variedadInput.value){
alert("Completa nombre y variedad");
return;
}

fase1.style.display="none";
fase2.style.display="block";
criteriosDiv.innerHTML="";
puntuaciones={};

criteriosLista.forEach(c=>{
let bloque=document.createElement("div");

let titulo=document.createElement("h3");
titulo.textContent=c[0];

let desc=document.createElement("div");
desc.className="small";
desc.textContent=c[1];

let rating=document.createElement("div");
rating.className="rating";

bloque.appendChild(titulo);
bloque.appendChild(desc);
bloque.appendChild(rating);

criteriosDiv.appendChild(bloque);

crearBotones(rating, c[0]);
});
}

// calcular nota
function calcular(){
let total=0, pesoTotal=0;

for(let k in puntuaciones){
total += puntuaciones[k]*pesos[k];
pesoTotal += pesos[k];
}

if(pesoTotal===0) return 0;

let nota = (total/pesoTotal).toFixed(2);
notaFinalSpan.textContent = nota;
return nota;
}

// guardar
function guardar(){

if(Object.keys(puntuaciones).length !== criteriosLista.length){
alert("Completa todas las puntuaciones");
return;
}

let nota = calcular();

// evitar duplicados
if(catas.some(c=>c.nota == nota)){
alert("No puedes repetir nota final");
return;
}

let nueva = {
nombre: nombreInput.value,
variedad: variedadInput.value,
precio: precioInput.value,
puntos: {...puntuaciones},
nota: nota,
comentarios: comentariosInput.value,
fecha: new Date().toLocaleString()
};

catas.push(nueva);

// ordenar ranking
catas.sort((a,b)=>b.nota-a.nota);

localStorage.setItem("catas", JSON.stringify(catas));

render();
reset();
}

// render historial
function render(){
historialDiv.innerHTML="";

catas.forEach((c,i)=>{
let div=document.createElement("div");
div.className="card";

let detalle="";
for(let k in c.puntos){
detalle += `${k}: ${c.puntos[k]}<br>`;
}

div.innerHTML=`
<strong>#${i+1} ${c.variedad}</strong><br>
Catador: ${c.nombre}<br>
Precio: €${c.precio}<br>
Nota: ${c.nota}<br>

<details>
<summary>Ver detalles</summary>
${detalle}
<br><br>${c.comentarios || ""}
<br><br><small>${c.fecha}</small>
</details>
`;

historialDiv.appendChild(div);
});
}

// reset
function reset(){
fase1.style.display="block";
fase2.style.display="none";

criteriosDiv.innerHTML="";
puntuaciones={};

nombreInput.value="";
variedadInput.value="";
precioInput.value="";
comentariosInput.value="";
notaFinalSpan.textContent="0";
}

// cargar historial al abrir
render();

</script>
</body>
</html>
